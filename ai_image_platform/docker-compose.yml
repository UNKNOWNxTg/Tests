version: '3.8'

services:
  # Main application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-image-app
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - WORKERS=4
      - HOST=0.0.0.0
      - PORT=8000
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - PROXY_ENABLED=true
      - PROXY_REFRESH_INTERVAL=300
      - DATABASE_URL=sqlite+aiosqlite:///./data/app.db
      - LOG_LEVEL=INFO
      - UVLOOP_ENABLED=true
      - CONNECTION_POOL_SIZE=100
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ai-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # Nginx reverse proxy (optional - comment out if not needed)
  nginx:
    image: nginx:alpine
    container_name: ai-image-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployments/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - ai-network
    profiles:
      - with-nginx

  # Redis (optional - for distributed deployment)
  redis:
    image: redis:7-alpine
    container_name: ai-image-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - ai-network
    profiles:
      - with-redis
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

networks:
  ai-network:
    driver: bridge

volumes:
  redis-data:
